schema_version = 1

[template]
name = "claude-opus"
description = "XML-structured bundle for Claude Opus 4.7 (1M context window)"
target_model = "claude-opus-4.7"
context_window = 1000000

[format]
structure = "xml"
content_format = "markdown"

[format.xml]
include_attributes = true
empty_section_handling = "omit"

[ordering]
sections = [
  "task",
  "feature",
  "deliverables",
  "governing_adrs",
  "test_criteria",
  "dependencies",
  "constraints",
  "bundle_metrics",
]
deliverables_at_top = true
critical_first = true
adrs_ordered_by = "centrality"
tcs_ordered_by = "type"

[token_budget]
target_max = 200000
hard_max = 1000000
