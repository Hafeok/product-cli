# cargo-deny configuration — supply-chain rules (Tier 3c).
# See conventions/docs/CTX-DEPS.md for the rule catalogue and rationale.
#
# Run locally with: cargo deny check
# CI runs the same command on every PR via .github/workflows/product-ci.yml.

[graph]
all-features = true

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories — RustSec security database
# ---------------------------------------------------------------------------
[advisories]
version = 2
# Vulnerable crates fail the build. Yanked crates warn (downgrades are
# usually a maintainer mistake, not a security issue, and resolving them
# requires a `cargo update` we may not want on the same PR).
yanked = "warn"
# RUSTSEC-2024-0436: `paste` is unmaintained. It is a build-time proc-macro
# pulled in transitively by cel-interpreter (the CEL evaluator under pf/rules)
# — no runtime exposure and no upstream replacement available. Revisit if
# cel-interpreter drops it or a maintained fork lands.
#
# RUSTSEC-2026-0194 / RUSTSEC-2026-0195: DoS advisories in `quick-xml` <0.41
# (quadratic duplicate-attribute check; unbounded namespace allocation in
# `NsReader`). Both require parsing attacker-controlled XML. quick-xml reaches
# us only transitively through oxigraph's `oxrdfxml` (RDF/XML) and `sparesults`
# (SPARQL-Results XML) — neither path is exercised: product-core loads oxigraph
# exclusively with `RdfFormat::Turtle` and consumes query results as native Rust
# `QueryResults` enums (see pf/{seed,query,sparql_rules}.rs), never XML, and the
# only bytes parsed are our own generated Turtle or the user's local `.ttl`. The
# fix requires `quick-xml >=0.41`, but every published oxigraph/sparesults/
# oxrdfxml release still pins `quick-xml ^0.37`, so there is no upgrade path yet.
# Revisit when the oxigraph ecosystem moves to quick-xml >=0.41.
ignore = ["RUSTSEC-2024-0436", "RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]

# ---------------------------------------------------------------------------
# Licenses — explicit allow-list. New license types require a deliberate PR.
# ---------------------------------------------------------------------------
[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

# ring uses a custom license; the SPDX expression below mirrors what the
# upstream cargo-deny docs recommend.
[[licenses.exceptions]]
allow = ["OpenSSL"]
crate = "ring"

# ---------------------------------------------------------------------------
# Bans — duplicate dependencies and explicit denies.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace `path` deps (product-core/product-mcp) carry no version and
# would otherwise trip the wildcard ban — they are first-party, not crates.io.
allow-wildcard-paths = true
highlight = "all"

# Explicitly banned crates with rationale.
deny = []

# ---------------------------------------------------------------------------
# Sources — only crates.io and the workspace itself; no git URLs without
# explicit allow.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
