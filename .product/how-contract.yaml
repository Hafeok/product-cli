archetype: product-cli
realises_version: 1.0.0
top_decisions:
- id: slice-adapter
  decision: 'Pure pf:: domain slices in product-core; thin CLI adapters in product-cli/src/commands'
  rationale: logic is unit-testable without tempdirs or print capture; sibling CLIs reuse the slice library (FT-107)
  licenses:
  - slice-cohesion
  - pure-core
  enforced_by:
  - code-quality-tests
- id: native-checkers
  decision: Conformance checkers are native Rust mirroring the vendored SHACL/JSON schemas
  rationale: no Python runtime in a Rust CLI; in-process typed violations; cross-checked against pyshacl
  licenses:
  - conformance-fidelity
  enforced_by:
  - pyshacl-cross-check
- id: live-view-on-mcp-http
  decision: The live What-graph view is served by the running product mcp --http server, not a separate process or build step
  rationale: the MCP server is already running while an agent mutates the graph; one process and one shared graph load path make the view a live window into the same session
  licenses:
  - view-is-derived
  - model-separation
  enforced_by:
  - view-derivation-verified
- id: schema-from-structs
  decision: MCP write-tool input schemas are generated from the node structs via schemars, never hand-written
  rationale: a hand-maintained schema is a third copy of the field set (alongside the structs and CLI flags) that silently drifts; a schema-typed MCP client then mis-encodes undeclared array/bool fields. Deriving the schema from the structs makes any drift a compile/test failure.
  licenses:
  - schema-single-source
  enforced_by:
  - domain-schema-parity
principles:
- id: slice-cohesion
  statement: plan_/apply_/render_ functions are pure; I/O is isolated in apply_
  enforced_by:
  - code-quality-tests
- id: pure-core
  statement: product-core carries no clap/axum; CLI deps live only in product-cli
  enforced_by:
  - external-core-consumer
- id: conformance-fidelity
  statement: each native checker's verdict matches the vendored SHACL/JSON schema
  enforced_by:
  - pyshacl-cross-check
- id: zero-unwrap
  statement: no unwrap() in non-test code
  enforced_by:
  - clippy-unwrap-gate
- id: structured-mcp-ops
  statement: MCP mutating tools build a typed fragment and validate it in-loop; never emit raw text
  enforced_by:
  - domain-mcp-registry-tests
- id: cli-mcp-parity
  statement: every CLI command family exposes the same functionality as an MCP tool, or is explicitly classified CLI-only
  enforced_by:
  - cli-mcp-parity-gate
- id: behavior-verified-end-to-end
  statement: every CLI command family is exercised end-to-end through assert_cmd integration tests, each backed by a TC with runner config
  enforced_by:
  - integration-tests
- id: view-is-derived
  statement: the browser view is a derived projection of the What graph, rebuilt from .product/ per request, never a second source of truth
  enforced_by:
  - view-derivation-verified
- id: model-separation
  statement: the domain model (§3.1 structure) and event model (§3.2 behaviour) are honoured as a first-class visual partition — two lanes with bridge edges crossing between them
  enforced_by:
  - lane-separation-verified
- id: schema-single-source
  statement: product_domain_new/edit input schemas are generated from the model structs; every struct field is declared with its real JSON type, so the schema cannot drift from what the handler accepts
  enforced_by:
  - domain-schema-parity
- id: serialization-round-trips
  statement: 'every persisted model round-trips: parse(serialize(x)) equals x, proven by property tests over arbitrary values, never hand-picked example strings'
  enforced_by:
  - how-yaml-roundtrip-proptest
patterns:
- id: slice-plus-adapter
  shape: a pure src/<slice>/ module plus a thin commands/<cmd>.rs adapter
  realizes:
  - slice-cohesion
  - pure-core
  applied_by:
  - implement-slice
  enforced_by:
  - code-quality-tests
- id: native-checker
  shape: validate_* functions returning Vec<Violation> mirroring the SHACL shapes
  realizes:
  - conformance-fidelity
  enforced_by:
  - pyshacl-cross-check
- id: mcp-tool-surface
  shape: a ToolDef (name + JSON inputSchema) + a handler returning {ok,node,violations} + a registry dispatch arm + a call_tool test
  realizes:
  - structured-mcp-ops
  applied_by:
  - add-mcp-tool
  enforced_by:
  - domain-mcp-registry-tests
- id: integration-test
  shape: 'an assert_cmd-driven #[test] fn tc_XXX_* in tests/integration/mod.rs plus a TC-XXX doc with runner cargo-test wired to that fn name'
  realizes:
  - behavior-verified-end-to-end
  applied_by:
  - implement-slice
  enforced_by:
  - integration-tests
- id: mcp-http-view
  shape: GET / (embedded page) + GET /api/graph (JSON projection) + GET /api/events (SSE) on the product-mcp axum Router
  realizes:
  - view-is-derived
  applied_by:
  - serve-web-view
  enforced_by:
  - view-derivation-verified
- id: filesystem-change-source
  shape: a notify watcher over .product/ feeding a tokio broadcast the SSE handler forwards, catching MCP, CLI, hand-edit, and git mutations alike
  realizes:
  - view-is-derived
  applied_by:
  - serve-web-view
  enforced_by:
  - view-derivation-verified
- id: two-lane-view
  shape: an fcose relativePlacement constraint pinning domain left-of event, contexts as paired compound boxes, bridges crossing the divider, vendored Cytoscape embedded via include_str!
  realizes:
  - model-separation
  applied_by:
  - serve-web-view
  enforced_by:
  - lane-separation-verified
- id: generated-tool-schema
  shape: node_field_props() unions schemars::schema_for over every writable node kind; the node structs derive JsonSchema; new/edit input_schema is built from that union
  realizes:
  - schema-single-source
  applied_by:
  - add-mcp-tool
  enforced_by:
  - domain-schema-parity
- id: roundtrip-property-test
  shape: a proptest asserts parse(serialize(x)) == x over a strategy of adversarial text (YAML-significant chars), so every special character is covered by the property, not guessed
  realizes:
  - serialization-round-trips
  enforced_by:
  - how-yaml-roundtrip-proptest
- id: atomic-fileops
  shape: every .product write goes through fileops::atomic_write under an advisory RepoLock; validation failure rolls back the whole node
  realizes:
  - view-is-derived
  - serialization-round-trips
application_contract:
  id: product-cli-app
  language: Rust
  layering:
  - core
  - cli
  feature_organization: vertical slices (slice + adapter)
  statements:
  - id: no-unwrap
    statement: no unwrap() in non-test code
    enforced_by: clippy-unwrap-gate
  - id: files-under-400
    statement: every src file is under 400 lines
    enforced_by: file-length-fitness
infrastructure_contract:
  id: product-cli-dist
  satisfies: product-cli-app
  frozen: true
  resources:
  - id: binary
    kind: release
    choice: cargo-dist GitHub release
interface_contracts: []
