  html, body { margin: 0; height: 100%; background: var(--slate-900); }
  #root { height: 100%; }

  /* Blueprint (light) surface — invert the slate ramp the dark tool is built on,
     so the same components read as ink-on-paper. EM semantic colours are untouched. */
  [data-surface="blueprint"] {
    --slate-950: #ffffff;
    --slate-900: #f3f7fb;  /* canvas / deepest bg → drafting paper */
    --slate-800: #ffffff;  /* panels / header */
    --slate-700: #d8e4ef;  /* hairlines */
    --slate-600: #b9cee0;  /* borders */
    --slate-500: #6f93b3;  /* drawn rules / muted lines */
    --slate-400: #51708c;  /* muted text */
    --slate-300: #2f4a63;
    --slate-200: #122b42;  /* body text */
    --slate-100: #0b1f33;  /* headings */
  }
  [data-surface="blueprint"] { background: var(--slate-900) !important; color: var(--slate-200); }
</style>
