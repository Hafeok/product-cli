<!DOCTYPE html>
<!--
  Live What-Graph view. Fully self-contained: no CDN, no build step, no
  external fonts — served from the product-mcp binary via include_str!. It
  reproduces the "product-cli What views" design handoff as three connected,
  data-driven graph views over the live /api/graph projection:

    • Systems — the product → systems & journeys map (§3.0): a product owns
      domains + systems; systems reference domains; journeys cross systems via
      a Translation.
    • Domain  — one bounded context as an ER graph (§3.1): aggregates,
      entities, value-objects and invariants, colour-coded, with relations and
      invariant governance.
    • Flows   — one system's event-model flows (§3.2) as Event-Modeling
      swimlanes: Triggers/UI · Commands·Views · per-aggregate event streams.

  Tabs, theme (dark "graph" / light "blueprint") and density are remembered in
  localStorage. Everything live-refreshes from /api/events (SSE 'changed'); the
  phase stepper follows /api/session.

  The Event-Modeling semantic palette is load-bearing: command = blue,
  view = green, event = amber, trigger = violet, ui-step = dashed neutral,
  bridge / journey = magenta. Never recolour those.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>What Graph — Live View</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M5 6 H27 L24.3 12.2 H7.7 Z' fill='%233b82f6'/%3E%3Cpath d='M7.9 13.1 H24.1 L21.6 19.1 H10.4 Z' fill='%23f59e0b'/%3E%3Cpath d='M10.6 20 H21.4 L18.9 26 H13.1 Z' fill='%2322c55e'/%3E%3C/svg%3E" />
<style>
/* ── design-system tokens (embedded, no @import) ───────────────────────────*/
:root{
  --slate-950:#0b1220; --slate-900:#0f172a; --slate-800:#1e293b; --slate-700:#334155;
  --slate-600:#475569; --slate-500:#64748b; --slate-400:#94a3b8; --slate-300:#cbd5e1;
  --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc; --white:#fff;
  --blue-700:#1763b6; --blue-600:#2563eb; --blue-500:#3b82f6; --blue-400:#60a5fa; --blue-100:#d6e6f6;
  /* load-bearing Event-Modeling semantic palette */
  --em-command:#2563eb; --em-view:#16a34a; --em-event:#f59e0b; --em-event-deep:#d97706;
  --em-trigger:#7c3aed; --em-trigger-soft:#a78bfa; --em-bridge:#db2777;
  --kind-entity:#1d4ed8; --kind-value-object:#3b82f6; --kind-invariant:#6366f1;
  --ok-bg:#14532d;
  --conf-described:#94a3b8; --conf-realised:#2563eb; --conf-verified:#16a34a; --conf-delivered:#7c3aed;
  --font-sans:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono','SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
  --radius:5px; --radius-md:8px; --radius-pill:999px;
  --shadow-graph:0 8px 28px rgba(0,0,0,.45);
  --ease:cubic-bezier(.2,0,0,1); --dur-fast:120ms; --dur:200ms;
  /* dark "graph" surface aliases (default) */
  --bg:var(--slate-900); --surface:var(--slate-800); --surface-2:var(--slate-700);
  --surface-sunken:var(--slate-950); --text:var(--slate-200); --text-muted:var(--slate-400);
  --text-faint:var(--slate-500); --border:var(--slate-600); --border-soft:var(--slate-700);
  --focus-ring:var(--blue-400);
}
/* light "blueprint" surface — invert the slate ramp so the same components read
   as ink-on-paper. The EM semantic colours are untouched. */
[data-surface="blueprint"]{
  --slate-950:#fff; --slate-900:#f3f7fb; --slate-800:#fff; --slate-700:#d8e4ef;
  --slate-600:#b9cee0; --slate-500:#6f93b3; --slate-400:#51708c; --slate-300:#2f4a63;
  --slate-200:#122b42; --slate-100:#0b1f33; --slate-50:#0b1f33;
  /* re-declare the semantic aliases *in this scope* so they substitute the
     blueprint slate ramp — a var() inside a custom property is resolved where
     the property is declared, so overriding the ramp alone is not enough. */
  --bg:var(--slate-900); --surface:var(--slate-800); --surface-2:var(--slate-700);
  --surface-sunken:#e9f1f8; --text:var(--slate-200); --text-muted:var(--slate-400);
  --text-faint:var(--slate-500); --border:var(--slate-600); --border-soft:var(--slate-700);
  --focus-ring:var(--blue-600); --shadow-graph:0 8px 28px rgba(11,31,51,.14);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;
  line-height:1.5;-webkit-font-smoothing:antialiased;}
#app{height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--text);}

/* header */
header{display:flex;align-items:center;gap:16px;padding:10px 18px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-wrap:wrap;flex:none;}
.logo{display:flex;align-items:center;gap:9px;}
.logo svg{display:block;}
.logo .wm{font-family:var(--font-mono);font-size:18px;font-weight:600;letter-spacing:-.01em;color:var(--text);}
.logo .wm span{color:var(--slate-500);font-weight:400;}
.chip-cmd{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);
  border:1px solid var(--border);border-radius:4px;padding:2px 8px;}
#live{display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:12px;font-family:var(--font-mono);}
#dot{width:8px;height:8px;border-radius:50%;background:#22c55e;transition:background .2s;}
#dot.flash{background:#fde047;}
#stepper{display:none;align-items:center;gap:5px;}
#stepper .step{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.04em;
  padding:3px 12px;border-radius:var(--radius-pill);background:var(--surface-2);color:var(--text-muted);transition:all var(--dur) var(--ease);}
#stepper .step.done{background:var(--ok-bg);color:#86efac;}
#stepper .step.cur{color:#fff;box-shadow:0 0 0 2px color-mix(in srgb,var(--text) 16%,transparent);}
#stepper .arr{color:var(--text-faint);font-family:var(--font-mono);font-size:11px;}
#sessmeta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-left:2px;}
#sessmeta .draft{color:#fbbf24;font-weight:700;} #sessmeta .final{color:#86efac;font-weight:700;}
#tabs{margin-left:auto;display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;}
#tabs button{background:transparent;border:0;color:var(--text-muted);font-family:var(--font-mono);
  font-size:12px;padding:5px 15px;cursor:pointer;}
#tabs button.on{background:var(--surface-2);color:var(--slate-100);}

/* bars */
.bar{display:flex;align-items:center;gap:8px;padding:7px 18px;flex:none;
  background:var(--bg);border-bottom:1px solid var(--border-soft);font-family:var(--font-mono);font-size:12px;}
.crumb{color:var(--blue-400);cursor:pointer;} .crumb.active{color:var(--slate-100);font-weight:600;cursor:default;}
.crumb-sep{color:var(--slate-600);} .bar .ref{margin-left:auto;color:var(--slate-600);}
.bar select{font-family:var(--font-mono);font-size:12px;background:var(--surface);color:var(--text);
  border:1px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer;}
#filters{display:flex;gap:16px;flex-wrap:wrap;color:var(--text-muted);}
#filters label{display:flex;align-items:center;gap:6px;cursor:pointer;}
#filters .sw{width:9px;height:9px;border-radius:2px;}
.chips{display:flex;gap:7px;flex-wrap:wrap;}
.flowchip{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:transparent;color:var(--text-muted);
  border:1px solid var(--border-soft);border-radius:6px;font-family:var(--font-sans);font-size:12.5px;font-weight:500;padding:5px 11px;}
.flowchip.on{background:var(--surface-2);color:var(--slate-100);border-color:var(--slate-500);}

/* canvas */
#canvas{position:relative;flex:1;min-height:0;overflow:auto;}
.cv-pad{position:relative;}
svg{display:block;overflow:visible;}
.elabel{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.04em;}

/* node cards (HTML, absolutely positioned over an SVG edge layer) */
.gnode{position:absolute;cursor:pointer;box-sizing:border-box;}
.card{width:100%;height:100%;box-sizing:border-box;border-radius:var(--radius-md);background:var(--surface);
  border:1.5px solid var(--border);box-shadow:var(--shadow-graph);overflow:hidden;}
.card.sel{border-color:var(--blue-400);box-shadow:0 0 0 3px color-mix(in srgb,var(--blue-400) 30%,transparent);}
.eyebrow{font-family:var(--font-mono);font-size:8.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;}
.tag{font-family:var(--font-mono);font-size:9.5px;border:1px solid var(--border-soft);border-radius:3px;padding:1px 6px;white-space:nowrap;}

/* legend + detail panel */
.legend{position:absolute;left:16px;bottom:14px;display:flex;gap:13px;flex-wrap:wrap;z-index:5;
  background:color-mix(in srgb,var(--bg) 82%,transparent);padding:7px 12px;border-radius:6px;border:1px solid var(--border-soft);}
.legend span{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
.legend .sw{width:11px;height:11px;border-radius:3px;}
#panel{position:absolute;top:12px;right:12px;bottom:12px;width:300px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow-graph);
  z-index:8;overflow:auto;display:none;}
#panel .ktag{display:inline-flex;align-items:center;font-family:var(--font-mono);font-weight:600;font-size:9.5px;
  letter-spacing:.12em;text-transform:uppercase;color:#0b1120;border-radius:3px;padding:2px 8px;}
#panel h2{margin:8px 0 2px;font-size:16px;font-family:var(--font-sans);color:var(--slate-100);}
#panel dl{margin:10px 0 0;} #panel .row{margin-top:10px;}
#panel dt{color:var(--text-muted);font-size:10px;font-family:var(--font-mono);letter-spacing:.12em;text-transform:uppercase;}
#panel dd{margin:3px 0 0;font-size:12px;font-family:var(--font-mono);color:var(--slate-200);line-height:1.45;word-break:break-word;}
#panel .act{margin-top:14px;width:100%;background:var(--blue-600);border:1px solid var(--blue-500);color:#fff;
  border-radius:5px;padding:8px 12px;cursor:pointer;font-family:var(--font-mono);font-size:11.5px;}
#panel .close{margin-top:16px;background:none;border:1px solid var(--border);color:var(--slate-300);
  border-radius:5px;padding:5px 12px;cursor:pointer;font-family:var(--font-mono);font-size:11px;}
.confdot{width:9px;height:9px;border-radius:50%;flex:none;display:inline-block;}

/* tweaks panel */
#tweaks{position:absolute;right:14px;bottom:14px;z-index:9;font-family:var(--font-mono);}
#tweaks .gear{width:34px;height:34px;border-radius:var(--radius-pill);border:1px solid var(--border);
  background:var(--surface);color:var(--text-muted);cursor:pointer;font-size:15px;box-shadow:var(--shadow-graph);}
#tweaks .body{display:none;position:absolute;right:0;bottom:42px;width:210px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;box-shadow:var(--shadow-graph);}
#tweaks.open .body{display:block;}
#tweaks .sec{font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin:10px 0 6px;}
#tweaks .sec:first-child{margin-top:0;}
#tweaks .opt{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--text-muted);margin:6px 0;}
#tweaks .seg{display:flex;border:1px solid var(--border-soft);border-radius:5px;overflow:hidden;}
#tweaks .seg button{background:transparent;border:0;color:var(--text-muted);font-family:var(--font-mono);font-size:10.5px;padding:3px 8px;cursor:pointer;}
#tweaks .seg button.on{background:var(--surface-2);color:var(--slate-100);}
#tweaks input[type=checkbox]{accent-color:var(--blue-500);}

/* in-progress session draft notice */
#draftbar{display:none;align-items:center;gap:9px;padding:6px 18px;flex:none;font-family:var(--font-mono);
  font-size:11.5px;color:#fde68a;background:color-mix(in srgb,#fbbf24 13%,var(--bg));
  border-bottom:1px solid color-mix(in srgb,#fbbf24 40%,transparent);box-shadow:inset 3px 0 0 #fbbf24;}
#draftbar .dt{font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fbbf24;}
#draftbar .dm{color:var(--text-muted);}
#draftbar .dg{margin-left:auto;color:#fcd34d;}

#empty{padding:48px;text-align:center;color:var(--text-muted);font-family:var(--font-mono);}
code{font-family:var(--font-mono);background:var(--surface-sunken);padding:1px 5px;border-radius:3px;}
</style>
</head>
<body>
<div id="app" data-surface="graph">
  <header>
    <div class="logo">
      <svg width="30" height="30" viewBox="0 0 32 32" aria-label="Product Framework mark">
        <path d="M5 6 H27 L24.3 12.2 H7.7 Z" fill="#3b82f6"></path>
        <path d="M7.9 13.1 H24.1 L21.6 19.1 H10.4 Z" fill="#f59e0b"></path>
        <path d="M10.6 20 H21.4 L18.9 26 H13.1 Z" fill="#22c55e"></path>
      </svg>
      <span class="wm">product<span> framework</span></span>
    </div>
    <span class="chip-cmd">product mcp --http</span>
    <div id="stepper">
      <span class="step" data-p="what">What</span><span class="arr">›</span>
      <span class="step" data-p="how">How</span><span class="arr">›</span>
      <span class="step" data-p="build">Build</span>
      <span id="sessmeta"></span>
    </div>
    <span id="live"><span id="dot"></span><span id="status">connecting…</span></span>
    <div id="tabs">
      <button data-tab="systems">Systems</button>
      <button data-tab="domain">Domain</button>
      <button data-tab="flows">Flows</button>
    </div>
  </header>
  <div id="draftbar"></div>
  <div class="bar" id="crumbbar"></div>
  <div class="bar" id="subbar" style="display:none"></div>
  <div id="canvas">
    <div class="cv-pad" id="cvpad"></div>
    <div id="empty" style="display:none"></div>
    <aside id="panel"></aside>
    <div id="tweaks">
      <div class="body" id="tweaksBody"></div>
      <button class="gear" id="tweaksGear" title="display options">⚙</button>
    </div>
  </div>
</div>
<script>
const NS='http://www.w3.org/2000/svg';
const $=id=>document.getElementById(id);
function h(tag,attrs,...kids){const n=document.createElement(tag);apply(n,attrs);add(n,kids);return n;}
function s(tag,attrs,...kids){const n=document.createElementNS(NS,tag);
  for(const k in(attrs||{})){const v=attrs[k];if(v==null)continue;
    if(k==='style'&&typeof v==='object')Object.assign(n.style,v);
    else if(k.startsWith('on'))n[k.toLowerCase()]=v;
    else n.setAttribute(k,v);}
  add(n,kids);return n;}
function apply(n,attrs){for(const k in(attrs||{})){const v=attrs[k];if(v==null)continue;
  if(k==='style')Object.assign(n.style,v);else if(k==='class')n.className=v;else if(k.startsWith('on'))n[k.toLowerCase()]=v;
  else if(k==='html')n.innerHTML=v;else n.setAttribute(k,v);}}
function add(n,kids){for(const k of kids.flat()){if(k==null||k===false)continue;
  n.appendChild(typeof k==='string'||typeof k==='number'?document.createTextNode(String(k)):k);}}
function trim(t,n){t=t||'';return t.length>n?t.slice(0,n-1)+'…':t;}
// compact ER cardinality so relation labels stay clear of the cards
const CARD={'one-to-one':'1:1','one-to-many':'1:N','many-to-one':'N:1','many-to-many':'N:N'};
function card(c){return CARD[c]||c;}

/* ── load-bearing palette ──────────────────────────────────────────────────*/
const EM={command:'var(--em-command)',view:'var(--em-view)','read-model':'var(--em-view)',
  event:'var(--em-event)',trigger:'var(--em-trigger)','ui-step':'var(--slate-400)'};
const EM_ABBR={command:'CMD',view:'VIEW','read-model':'VIEW',event:'EVT',trigger:'TRIG','ui-step':'UI'};
const DOMC={aggregate:'var(--kind-entity)',entity:'var(--blue-500)','value-object':'var(--blue-400)',
  invariant:'var(--kind-invariant)',external:'var(--slate-400)'};
const FILTER_KINDS=['trigger','ui-step','command','view','event'];
const FILTER_COLOR={trigger:'var(--em-trigger)','ui-step':'var(--slate-400)',command:'var(--em-command)',view:'var(--em-view)',event:'var(--em-event)'};

/* ── app state ─────────────────────────────────────────────────────────────*/
const SID=new URLSearchParams(location.search).get('session');
const SQ=SID?('?session='+encodeURIComponent(SID)):'';
const ST={
  graph:null, tab:localStorage.getItem('viewTab')||'systems',
  surface:localStorage.getItem('viewSurface')||'graph',
  density:localStorage.getItem('viewDensity')||'comfortable',
  showConf:localStorage.getItem('viewConf')!=='0',
  ctxId:null, systemId:null, flowId:null,
  sel:{systems:null,domain:null,flows:null}, hidden:new Set(),
};

/* derived model from the flat /api/graph projection */
function derive(g){
  const byId={}; for(const n of g.nodes) byId[n.id]=n;
  const out=k=>g.edges.filter(e=>e.kind===k);
  const product=g.nodes.find(n=>n.kind==='product')||null;
  const systems=g.nodes.filter(n=>n.kind==='system');
  const journeys=g.nodes.filter(n=>n.kind==='journey');
  const domains=g.contexts.slice();
  // a system's flows (system-of: flow → system)
  const sysFlows={}; for(const e of out('system-of')){(sysFlows[e.to]=sysFlows[e.to]||[]).push(e.from);}
  // a system references domains
  const sysRefs={}; for(const e of out('references')){(sysRefs[e.from]=sysRefs[e.from]||[]).push(e.to);}
  return {byId,product,systems,journeys,domains,sysFlows,sysRefs};
}

/* ── geometry helpers (shared.jsx anchor/curve, vanilla) ───────────────────*/
function anchor(b,tx,ty){const dx=tx-b.x,dy=ty-b.y;if(!dx&&!dy)return{x:b.x,y:b.y};
  const sx=dx===0?Infinity:(b.w/2)/Math.abs(dx),sy=dy===0?Infinity:(b.h/2)/Math.abs(dy),k=Math.min(sx,sy);
  return{x:b.x+dx*k,y:b.y+dy*k};}
function curve(a,b){const dx=b.x-a.x,dy=b.y-a.y;
  if(Math.abs(dy)>=Math.abs(dx)){const my=(a.y+b.y)/2;return`M${a.x},${a.y} C${a.x},${my} ${b.x},${my} ${b.x},${b.y}`;}
  const mx=(a.x+b.x)/2;return`M${a.x},${a.y} C${mx},${a.y} ${mx},${b.y} ${b.x},${b.y}`;}

function edgeLayer(w,hgt,edges,pos,showLabels){
  const defs=s('defs',{},
    s('marker',{id:'arr',viewBox:'0 0 10 10',refX:'8.5',refY:'5',markerWidth:'6.5',markerHeight:'6.5','orient':'auto-start-reverse'},
      s('path',{d:'M0,0 L10,5 L0,10 z',fill:'var(--slate-500)'})),
    s('marker',{id:'arrmag',viewBox:'0 0 10 10',refX:'8.5',refY:'5',markerWidth:'6.5',markerHeight:'6.5','orient':'auto-start-reverse'},
      s('path',{d:'M0,0 L10,5 L0,10 z',fill:'var(--em-bridge)'})));
  const svg=s('svg',{width:w,height:hgt,style:{position:'absolute',inset:0,pointerEvents:'none'}},defs);
  for(const e of edges){const A=pos[e.from],B=pos[e.to];if(!A||!B)continue;
    const a=anchor(A,B.x,B.y),b=anchor(B,A.x,A.y),mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    const g1=s('g',{style:{opacity:e.opacity==null?1:e.opacity,transition:'opacity 140ms var(--ease)'}});
    g1.appendChild(s('path',{d:curve(a,b),fill:'none',stroke:e.stroke||'var(--slate-600)','stroke-width':e.width||1.5,
      'stroke-dasharray':e.dash||null,'marker-end':e.arrow===false?null:(e.marker==='mag'?'url(#arrmag)':'url(#arr)')}));
    if(showLabels&&e.label){const lw=e.label.length*6.2+10;
      g1.appendChild(s('rect',{x:mx-lw/2,y:my-8,rx:3,width:lw,height:16,fill:'var(--bg)',opacity:.95}));
      g1.appendChild(s('text',{x:mx,y:my+3.5,'text-anchor':'middle',class:'elabel',fill:e.labelColor||'var(--slate-400)'},e.label));}
    svg.appendChild(g1);}
  return svg;
}
function confDot(level){const c=`var(--conf-${level||'described'})`;
  return h('span',{class:'confdot',title:'conformance: '+(level||'described'),
    style:{background:c,boxShadow:`0 0 0 3px color-mix(in srgb,${c} 22%,transparent)`}});}

/* ── SYSTEMS view ──────────────────────────────────────────────────────────*/
function viewSystems(M){
  const pad=$('cvpad'); const W=Math.max($('canvas').clientWidth,860);
  const cx=W/2;
  const pos={}, cards=[]; let y=40;
  // product hero (only when one is captured — otherwise don't reserve the space)
  if(M.product){const pw=Math.min(420,W-80),ph=96;
    pos[M.product.id]={x:cx,y:y+ph/2,w:pw,h:ph};
    cards.push(productCard(M.product,pw,ph,pos[M.product.id])); y+=ph+56;}
  // domains — wrap to fit the viewport width instead of overflowing off-screen
  const dw=170,dh=80;
  const dl=wrapLayout(M.domains,dw,dh,22,16,W,y);
  dl.pos.forEach((p,i)=>{const d=M.domains[i];
    pos['ctx:'+d.id]={x:p.x,y:p.y,w:dw,h:dh}; cards.push(domainCard(d,dw,dh,pos['ctx:'+d.id]));});

  const colNodes=COLS.map(([k])=>nodes.filter(n=>kindOf(n)===k));

      pos[n.id]={x:cx,y:y+ht/2,w:200,h:ht}; cards.push(erCard(n,kindOf(n),pos[n.id])); y+=ht+vgap; maxY=Math.max(maxY,y);}});

/* ── FLOWS view (one system's event-model flows) ───────────────────────────*/
function flowMembers(g,flowId){
  const stepIds=g.edges.filter(e=>e.from===flowId&&e.kind==='step').map(e=>e.to);
  const byId={};g.nodes.forEach(n=>byId[n.id]=n);

  const member=new Set(anchors); stepIds.forEach(id=>{if(byId[id])member.add(id);});
  const ek=k=>g.edges.filter(e=>e.kind===k);
  for(const e of ek('emits'))if(member.has(e.from))member.add(e.to);          // command emits event
  for(const e of ek('issues'))if(member.has(e.to))member.add(e.from);          // trigger issues command
  for(const e of ek('triggers'))if(member.has(e.to))member.add(e.from);        // ui triggers command
  for(const e of ek('displays'))if(member.has(e.to))member.add(e.from);        // ui displays view
  return {member,anchorOrder:anchors,byId};
}
function viewFlows(M){

  bg.appendChild(s('rect',{x:GUT,y:cvY-cvH/2-6,width:W-GUT,height:cvH+12,fill:'rgba(37,99,235,.05)'}));
  gut(bg,'Triggers / UI',pad+uiBandH/2,false); gut(bg,'Commands · Views',cvY,false);
  streamIds.forEach((st,i)=>{bg.appendChild(s('rect',{x:GUT,y:laneY0[i],width:W-GUT,height:laneH[i]-6,fill:'rgba(245,158,11,.06)'}));
    bg.appendChild(s('line',{x1:GUT,y1:laneY0[i],x2:W,y2:laneY0[i],stroke:'var(--border-soft)','stroke-width':1}));

  pad0.appendChild(bg);
  // edges: spine (issues/triggers/emits) always; cross (projects via stream feeds, displays) lighter
  const E=[];
  for(const e of issues)E.push({from:e.from,to:e.to,stroke:'var(--slate-500)',width:1.5,opacity:.62,arrow:true});
  for(const e of triggers)E.push({from:e.from,to:e.to,stroke:'var(--slate-500)',width:1.5,opacity:.62,arrow:true});
  for(const e of emits)E.push({from:e.from,to:e.to,stroke:'var(--slate-500)',width:1.5,opacity:.62,arrow:true});
  for(const e of displays)E.push({from:e.from,to:e.to,stroke:'#38bdf8',width:1.5,dash:'5 3',opacity:.4,arrow:true});

}

/* ── detail panel ──────────────────────────────────────────────────────────*/
function selectNode(tab,id){ST.sel[tab]=(ST.sel[tab]===id?null:id);renderPanel();}
function ktag(label,color){return h('span',{class:'ktag',style:{background:color}},label);}
function renderPanel(){
  const p=$('panel'); const tab=ST.tab; const id=ST.sel[tab];
  if(!id){p.style.display='none';return;}
  const g=ST.graph; const n=g.nodes.find(x=>x.id===id)||(id.startsWith('ctx:')?{ctx:id.slice(4)}:null);
  let tagEl,title,rows=[],action=null;
  if(id.startsWith('ctx:')){const d=g.contexts.find(c=>c.id===id.slice(4));if(!d){p.style.display='none';return;}
    tagEl=ktag('domain','var(--kind-entity)');title=d.label;
    rows=[['ubiquitous language',(d.glossary||[]).join(' · ')],['purpose',d.purpose||'—']];
    action={label:'open domain graph →',fn:()=>{ST.ctxId=d.id;setTab('domain');}};}
  else if(n){const outs=g.edges.filter(e=>e.from===id),ins=g.edges.filter(e=>e.to===id);
    const line=(e,dir)=>dir==='out'?`→ ${e.label||e.kind} ${e.to}`:`← ${e.from} (${e.kind})`;
    const colorFor={product:'var(--blue-400)',system:'var(--slate-300)',entity:'var(--kind-entity)',
      'value-object':'var(--blue-400)',invariant:'var(--kind-invariant)',command:'var(--em-command)',
      event:'var(--em-event)','read-model':'var(--em-view)',trigger:'var(--em-trigger)','ui-step':'var(--slate-400)',
      flow:'var(--em-event)',journey:'var(--em-bridge)'};
    tagEl=ktag(n.kind+(n.aggregate?' · root':''),colorFor[n.kind]||'var(--slate-300)');title=n.label;
    rows=[['id',n.id]];
    if(n.purpose)rows.push(['purpose',n.purpose]);
    if(n.context&&n.kind!=='system')rows.push(['context',n.context]);
    if(n.kind==='system'&&n.context)rows.push(['kind',n.context]);
    if(n.tags&&n.tags.length)rows.push([n.kind==='system'?'platforms / classes':'tags',n.tags.join(' · ')]);
    if(n.fields&&n.fields.length)rows.push([n.kind==='invariant'?'rule':n.kind==='system'?'quality demands':'fields',n.fields]);
    if(outs.length)rows.push(['out',outs.slice(0,12).map(e=>line(e,'out'))]);
    if(ins.length)rows.push(['in',ins.slice(0,12).map(e=>line(e,'in'))]);
    if(n.kind==='system')action={label:'open event-model flows →',fn:()=>openSystem(n.id)};
  } else {p.style.display='none';return;}
  p.innerHTML=''; p.style.display='block'; p.appendChild(tagEl);
  p.appendChild(h('h2',{},title));
  const dl=h('dl',{});
  for(const [k,v] of rows){if(v==null||v==='')continue;const vals=Array.isArray(v)?v:[v];
    dl.appendChild(h('div',{class:'row'},h('dt',{},k),...vals.map(t=>h('dd',{},String(t)))));}
  p.appendChild(dl);
  if(action)p.appendChild(h('button',{class:'act',onclick:action.fn},action.label));
  p.appendChild(h('button',{class:'close',onclick:()=>{ST.sel[tab]=null;p.style.display='none';}},'× close'));
}

/* ── shell: tabs, bars, tweaks ─────────────────────────────────────────────*/
function setTab(t){ST.tab=t;localStorage.setItem('viewTab',t);
  for(const b of document.querySelectorAll('#tabs button'))b.classList.toggle('on',b.dataset.tab===t);
  render();}
function openSystem(id){ST.systemId=id;ST.sel.flows=null;setTab('flows');}
function showEmpty(msg){$('cvpad').innerHTML='';$('empty').style.display='block';$('empty').innerHTML=msg;}
function renderBars(M){
  const cb=$('crumbbar');cb.innerHTML='';
  const crumb=(label,active,fn)=>h('span',{class:'crumb'+(active?' active':''),onclick:active?null:fn},label);
  const sep=()=>h('span',{class:'crumb-sep'},'›');
  const prod=M.product?M.product.label:'product';
  cb.appendChild(crumb(prod,ST.tab==='systems',()=>setTab('systems')));
  let ref='';
  if(ST.tab==='systems')ref='product → systems & journeys · §3.0';
  if(ST.tab==='domain'){const d=M.domains.find(x=>x.id===ST.ctxId)||M.domains[0];
    cb.appendChild(sep());cb.appendChild(crumb(d?d.label:'domain',true));ref='domain entities & relations · §3.1';}
  if(ST.tab==='flows'){const sy=M.systems.find(x=>x.id===ST.systemId)||M.systems[0];
    cb.appendChild(sep());cb.appendChild(crumb(sy?sy.label:'system',true));ref='event-model flows · §3.2';}
  cb.appendChild(h('span',{class:'ref'},ref));
  // sub-bar
  const sb=$('subbar');sb.innerHTML='';sb.style.display='none';
  if(ST.tab==='domain'&&M.domains.length){sb.style.display='flex';
    sb.appendChild(h('span',{style:{color:'var(--slate-500)'}},'bounded context'));
    const sel=h('select',{onchange:e=>{ST.ctxId=e.target.value;ST.sel.domain=null;render();}},
      ...M.domains.map(d=>h('option',{value:d.id,selected:d.id===(ST.ctxId||M.domains[0].id)?'selected':null},d.label)));
    sb.appendChild(sel);}
  if(ST.tab==='flows'){const sy=M.systems.find(x=>x.id===ST.systemId)||M.systems[0];const flows=sy?(M.sysFlows[sy.id]||[]):[];
    if(flows.length){sb.style.display='flex';
      sb.appendChild(h('span',{style:{color:'var(--slate-500)',fontSize:'10px',letterSpacing:'.12em',textTransform:'uppercase'}},'flows in '+(sy?sy.label:'')));
      const chips=h('div',{class:'chips'});
      for(const fid of flows){const fn=ST.graph.nodes.find(n=>n.id===fid);
        chips.appendChild(h('button',{class:'flowchip'+(fid===ST.flowId?' on':''),onclick:()=>{ST.flowId=fid;ST.sel.flows=null;render();}},
          fn?trim(fn.label,40):fid));}
      sb.appendChild(chips);
      // filters
      const fbox=h('div',{id:'filters',style:{marginLeft:'auto'}});
      for(const k of FILTER_KINDS){const cb2=h('input',{type:'checkbox',checked:!ST.hidden.has(k)?'checked':null,
        onchange:()=>{ST.hidden.has(k)?ST.hidden.delete(k):ST.hidden.add(k);render();}});
        fbox.appendChild(h('label',{},cb2,h('span',{class:'sw',style:{background:FILTER_COLOR[k]}}),k));}
      sb.appendChild(fbox);}}
}
function renderTweaks(){
  const b=$('tweaksBody');b.innerHTML='';
  const seg=(opts,cur,fn)=>{const d=h('div',{class:'seg'});
    for(const[v,l]of opts)d.appendChild(h('button',{class:cur===v?'on':'',onclick:()=>fn(v)},l));return d;};
  b.appendChild(h('div',{class:'sec'},'Surface'));
  b.appendChild(h('div',{class:'opt'},'Theme',seg([['graph','dark'],['blueprint','light']],ST.surface,v=>{
    ST.surface=v;localStorage.setItem('viewSurface',v);$('app').setAttribute('data-surface',v);renderTweaks();render();})));
  b.appendChild(h('div',{class:'opt'},'Density',seg([['compact','compact'],['comfortable','comfy']],ST.density,v=>{
    ST.density=v;localStorage.setItem('viewDensity',v);renderTweaks();render();})));
  b.appendChild(h('div',{class:'sec'},'Overlays'));
  const cf=h('input',{type:'checkbox',checked:ST.showConf?'checked':null,onchange:e=>{
    ST.showConf=e.target.checked;localStorage.setItem('viewConf',ST.showConf?'1':'0');render();}});
  b.appendChild(h('div',{class:'opt'},'Conformance',cf));
}

/* ── render ────────────────────────────────────────────────────────────────*/
function render(){
  if(!ST.graph){return;}
  const M=derive(ST.graph);
  if(!ST.graph.nodes.length){renderBars(M);showEmpty('No What graph yet — capture one with <code>product domain new …</code>');return;}
  $('empty').style.display='none';
  $('cvpad').innerHTML=''; $('canvas').scrollTop=0;
  renderBars(M);
  if(ST.tab==='systems')viewSystems(M);
  else if(ST.tab==='domain')viewDomain(M);
  else viewFlows(M);
  renderPanel();
}

async function load(){
  try{const r=await fetch('/api/graph'+SQ);if(!r.ok)throw new Error(await r.text());ST.graph=await r.json();}
  catch(e){showEmpty(String(e.message||e));return;}
  render();
}

/* When the view follows an in-progress session it renders that session's
   isolated draft, not the canonical graph — flag it, and show how far the draft
   has drifted (canonical nodes the draft doesn't carry, e.g. authored after the
   session began). */
function renderDraftbar(s0){
  const b=$('draftbar');
  if(!s0.draft){b.style.display='none';return;}
  const ahead=(typeof s0.canonNodes==='number'&&typeof s0.draftNodes==='number')?s0.canonNodes-s0.draftNodes:null;
  b.innerHTML='';
  b.appendChild(h('span',{class:'dt'},'session draft'));
  b.appendChild(h('span',{class:'dm'},'showing this session’s isolated working copy ('+s0.phase+' phase) — not the canonical graph. Finalize to promote.'));
  if(ahead&&ahead>0)
    b.appendChild(h('span',{class:'dg'},'canonical has '+ahead+' node'+(ahead===1?'':'s')+' the draft doesn’t'));
  b.style.display='flex';
}

/* session phase stepper */
const PHASES=['what','how','build'];const PHASE_COLOR={what:'var(--em-command)',how:'var(--em-event-deep)',build:'var(--em-view)'};
async function loadSession(){
  let s0;try{const r=await fetch('/api/session'+SQ);s0=await r.json();}catch(e){return;}
  const bar=$('stepper');
  if(!s0||!s0.active){bar.style.display='none';$('draftbar').style.display='none';document.title='What Graph — Live View';return;}
  bar.style.display='flex';
  renderDraftbar(s0);
  const cur=PHASES.indexOf(s0.phase),until=PHASES.indexOf(s0.until);
  for(const st of bar.querySelectorAll('.step')){const i=PHASES.indexOf(st.dataset.p);
    st.classList.toggle('done',i<cur);st.classList.toggle('cur',i===cur);
    st.style.background=i===cur?PHASE_COLOR[s0.phase]:'';st.style.opacity=i>until?'.35':'1';}
  $('sessmeta').innerHTML=`· ${s0.id} · `+(s0.finalized?'<span class="final">finalized</span>':'<span class="draft">DRAFT</span>');
  document.title=`${s0.phase.toUpperCase()} · ${s0.id} — What Graph`;
}

function connect(){
  const dot=$('dot'),st=$('status');
  const es=new EventSource('/api/events');
  const tick=()=>{dot.classList.add('flash');setTimeout(()=>dot.classList.remove('flash'),300);load();loadSession();};
  es.onopen=()=>{st.textContent='live';};
  es.addEventListener('changed',tick); es.onmessage=tick;
  es.onerror=()=>{st.textContent='reconnecting…';};
}

/* boot */
$('app').setAttribute('data-surface',ST.surface);
for(const b of document.querySelectorAll('#tabs button'))b.onclick=()=>setTab(b.dataset.tab);
$('tweaksGear').onclick=()=>$('tweaks').classList.toggle('open');
renderTweaks();
setTab(ST.tab);
load();loadSession();connect();
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>ST.graph&&render(),120);});
</script>
