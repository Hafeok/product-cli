# GitHub Actions CI workflow for the Product CLI
# Gates PRs on: graph check, tests, clippy, benchmarks
#
# Usage: copy this file to .github/workflows/product-ci.yml in your repo

name: Product CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'docs/**'
      - 'product.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'docs/**'
      - 'product.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p product

      - name: Unit tests
        run: cargo test -p product

      - name: Clippy
        run: cargo clippy -p product -- -D clippy::unwrap_used -D warnings

      - name: Graph check
        run: |
          # Exits 0 (clean), 2 (warnings only) = pass
          # Exits 1 (errors) = fail
          cargo run -p product -- graph check || [ $? -eq 2 ]

      - name: Graph check JSON
        run: |
          # Exits 0 (clean), 2 (warnings only) = pass; 1 (errors) = fail
          cargo run -p product -- graph check --format json > /tmp/graph-check.json 2>/dev/null || [ $? -eq 2 ]
          # Verify JSON output is valid
          python3 -c "import json; json.load(open('/tmp/graph-check.json'))"

      - name: Benchmarks
        run: cargo bench -p product --bench graph_bench
