# GitHub Actions CI workflow for the Product CLI
# Gates PRs on: graph check, tests, clippy, benchmarks
#
# Usage: copy this file to .github/workflows/product-ci.yml in your repo

name: Product CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'docs/**'
      - 'product.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'docs/**'
      - 'product.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain version is read from rust-toolchain.toml at the repo root so
      # local builds and CI stay in lockstep — to upgrade Rust, bump that file
      # and nothing else.
      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p product

      - name: Tests (all binaries)
        # --no-fail-fast runs every test binary (lib, integration, sessions,
        # property, code_quality, doc) and reports the full result set rather
        # than stopping at the first failing binary. Matches the `cargo t`
        # alias defined in .cargo/config.toml.
        run: cargo test -p product --no-fail-fast

      - name: Clippy
        run: cargo clippy -p product -- -D clippy::unwrap_used -D warnings

      - name: Graph check
        run: |
          # Exits 0 (clean), 2 (warnings only) = pass
          # Exits 1 (errors) = fail
          cargo run -p product -- graph check || [ $? -eq 2 ]

      - name: Graph check JSON
        run: |
          # Capture JSON output (discard cargo stderr); allow exit 2 (warnings-only)
          cargo run -p product -- graph check --format json 2>/dev/null > /tmp/graph-check.json || [ $? -eq 2 ]
          # Verify the output is valid JSON
          python3 -c "import sys,json; json.load(open('/tmp/graph-check.json'))"

      - name: Benchmarks
        run: cargo bench -p product --bench graph_bench
