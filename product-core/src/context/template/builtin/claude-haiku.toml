schema_version = 1

[template]
name = "claude-haiku"
description = "Compact XML-structured bundle for Claude Haiku 4.5 (200K context)"
target_model = "claude-haiku-4.5"
context_window = 200000

[format]
structure = "xml"
content_format = "markdown"

[format.xml]
include_attributes = true
empty_section_handling = "omit"

[ordering]
sections = [
  "task",
  "feature",
  "deliverables",
  "governing_adrs",
  "test_criteria",
]
deliverables_at_top = true
critical_first = true
adrs_ordered_by = "centrality"
tcs_ordered_by = "type"

[token_budget]
target_max = 100000
hard_max = 200000
