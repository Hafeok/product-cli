schema_version = 1

[template]
name = "gpt-mini-json"
description = "Compact JSON bundle for GPT-3.5 / GPT-4o-mini (128K context)"
target_model = "gpt-4o-mini"
context_window = 128000

[format]
structure = "json"
content_format = "markdown"

[ordering]
sections = [
  "task",
  "feature",
  "governing_adrs",
  "test_criteria",
]
deliverables_at_top = false
critical_first = true
adrs_ordered_by = "centrality"
tcs_ordered_by = "type"

[token_budget]
target_max = 100000
hard_max = 128000
