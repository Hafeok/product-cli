[env]
# Keep github-copilot-sdk's build.rs off the network: never download the
# Copilot CLI at build time. The SDK host resolves the CLI at runtime from
# COPILOT_CLI_PATH or PATH instead (product-mcp/src/copilot/).
COPILOT_SKIP_CLI_DOWNLOAD = "1"

[alias]
# Run every test binary in one pass — continues past failures and reports all
# results at the end. Use this instead of `cargo test`, which bails on the
# first failing binary and skips subsequent suites.
t = "test --no-fail-fast"

# Workspace convention enforcement — see conventions/README.md.
xtask = "run --package xtask --release --"

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "linker=rust-lld", "-C", "linker-flavor=ld.lld"]
